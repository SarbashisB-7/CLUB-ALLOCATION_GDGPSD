<script type="module">

         onSnapshot, query, orderBy, writeBatch, getDocs, setDoc }

const app = initializeApp({
  apiKey:"AIzaSyAdRgwlrX6mOuUGBmlM00JQC-73HkmVXtM",
  authDomain:"gd-goenka-clubs-5b00d.firebaseapp.com",
  projectId:"gd-goenka-clubs-5b00d",
  storageBucket:"gd-goenka-clubs-5b00d.firebasestorage.app",
  messagingSenderId:"293847865717",
  appId:"1:293847865717:web:b5e0a0cdf535adc120db3c"
});
const db  = getFirestore(app);
const COL = collection(db,"students");
const SCFG = doc(db,"config","segments");

// ── CLUBS ────────────────────────────────────────────────────────────────────
const CLUBS={
  A:[

    {id:"A3",name:"Non-Fire Cooking Club",cap:120},

    {id:"A6",name:"Creative Expressions Club",cap:210,acts:[
      {id:"A6-French",name:"French",cap:40},{id:"A6-Drama",name:"Drama",cap:40},
      {id:"A6-Writing",name:"Creative Writing",cap:100},{id:"A6-Reading",name:"Reading",cap:30}]},
    {id:"A7",name:"Music Club",cap:85},
    {id:"A8",name:"Karate Club",cap:100},
  ],
  B:[
    {id:"B1",name:"Tech Club",cap:50},
    {id:"B2",name:"Literary Expressions Club",cap:130,acts:[
      {id:"B2-Debate",name:"Debate",cap:50},{id:"B2-Writing",name:"Creative Writing",cap:50},
      {id:"B2-Reading",name:"Reading",cap:30}]},
    {id:"B3",name:"Math Club",cap:40},
    {id:"B4",name:"Science Club",cap:60},
    {id:"B5",name:"Explorers Club",cap:120,acts:[
      {id:"B5-Eco",name:"Eco",cap:40},{id:"B5-Quiz",name:"Quiz",cap:35},{id:"B5-Heritage",name:"Heritage",cap:45}]},
    {id:"B6",name:"Health & Fitness Club",cap:120,acts:[
      {id:"B6-Yoga",name:"Yoga",cap:30},{id:"B6-TT",name:"Table Tennis",cap:30},
      {id:"B6-Squash",name:"Squash",cap:20},{id:"B6-Cricket",name:"Cricket",cap:40}]},
    {id:"B7",name:"Rhythm & Vibration Club",cap:120,acts:[
      {id:"B7-Western",name:"Western Dance",cap:30},{id:"B7-Eastern",name:"Eastern Dance",cap:30},
      {id:"B7-Instrumental",name:"Instrumental",cap:30},{id:"B7-Vocal",name:"Vocal Music",cap:30}]},
    {id:"B8",name:"Artistic Expressions Club",cap:40},
  ],
  C:[
    {id:"C1",name:"AI & Data Science Club",cap:40},
    {id:"C2",name:"Science & Technology Club",cap:60},
    {id:"C3",name:"Non-Fire Cooking Club",cap:40},
    {id:"C4",name:"Commerce Club",cap:30},
    {id:"C5",name:"Literary, Quiz & Cultural Heritage Club",cap:115,acts:[
      {id:"C5-Literary",name:"Literary",cap:40},{id:"C5-Quiz",name:"Quiz",cap:30},
      {id:"C5-Heritage",name:"Cultural Heritage",cap:45}]},
    {id:"C6",name:"Performing Arts Club",cap:160,acts:[
      {id:"C6-Western",name:"Western Dance",cap:30},{id:"C6-Eastern",name:"Eastern Dance",cap:30},
      {id:"C6-Music",name:"Music",cap:30},{id:"C6-Drama",name:"Drama",cap:40},{id:"C6-Yoga",name:"Yoga",cap:30}]},
    {id:"C7",name:"Sports & Defence Club",cap:140,acts:[
      {id:"C7-Chess",name:"Chess",cap:40},{id:"C7-Football",name:"Football",cap:40},
      {id:"C7-Basketball",name:"Basketball",cap:30},{id:"C7-Taekwondo",name:"Taekwondo",cap:30}]},
    {id:"C8",name:"Foreign Language & Global Skills Club",cap:130,acts:[
      {id:"C8-Spanish",name:"Spanish",cap:30},{id:"C8-Reading",name:"Reading",cap:30},
      {id:"C8-Writing",name:"Creative Writing",cap:40},{id:"C8-Debate",name:"Debate",cap:30}]},
  ]
};
const ALL    = Object.values(CLUBS).flat();
const GRADES = ["Nursery/BV1","UKG/BV2","KG/BV3","I","II","III","IV","V","VI","VII","VIII","IX"];
const SINFO  = {
  A:{label:"Segment A",grades:"Nursery – Grade V",  col:"#2F81F7"},
  B:{label:"Segment B",grades:"Grades VI – VII",    col:"#3FB950"},
  C:{label:"Segment C",grades:"Grades VIII – IX",   col:"#BC8CFF"}
};

function seg(g){
  if(["Nursery/BV1","UKG/BV2","KG/BV3","I","II","III","IV","V"].includes(g)) return "A";
  if(["VI","VII"].includes(g)) return "B";
  if(["VIII","IX"].includes(g)) return "C";
  return null;
}
const gClub   = id      => ALL.find(c=>c.id===id);
const gAct    = (ci,ai) => gClub(ci)?.acts?.find(a=>a.id===ai);
const isAdmin = new URLSearchParams(location.search).get("admin")==="true";
const C={bg:"#0D1117",card:"#161B22",bdr:"#30363D",hd:"#1C2128",acc:"#2F81F7",grn:"#3FB950",amb:"#D29922",red:"#F85149",pur:"#BC8CFF",teal:"#39C5CF",txt:"#E6EDF3",mut:"#8B949E"};
const rc   = p => p==="1st"?C.grn:p==="2nd"?C.acc:p==="3rd"?C.amb:p==="admin"?C.pur:C.red;
const chip = (t,c)=>`<span class="chip" style="background:${c}22;color:${c};border:1px solid ${c}44">${t}</span>`;
const btn  = (t,fn,col,sm)=>`<button class="btn${sm?" btn-sm":""}" style="background:${col}" onclick="${fn}">${t}</button>`;
function dlCSV(name,rows){ const a=document.createElement("a"); a.href=URL.createObjectURL(new Blob([rows.join("\n")],{type:"text/csv"})); a.download=name; a.click(); }
function parseCSV(txt){
  const lines=txt.trim().split("\n"),out=[];
  for(let i=1;i<lines.length;i++){
    const c=lines[i].split(",").map(x=>x.trim().replace(/^"|"$/g,""));
    if(!c[0]) continue;
    out.push({name:c[0],grade:c[1]||"",section:c[2]||"",p1:c[3]||"",a1:c[4]||"",p2:c[5]||"",a2:c[6]||"",p3:c[7]||"",a3:c[8]||"",by:c[9]||"CSV",at:new Date().toISOString()});
  }
  return out;
}

// ── ALLOCATION ALGORITHM (untouched) ─────────────────────────────────────────
function counts(list){
  const cc={},ac={};
  ALL.forEach(c=>{ cc[c.id]=0; c.acts?.forEach(a=>{ ac[a.id]=0; }); });
  list.forEach(s=>{ if(s.aC) cc[s.aC]=(cc[s.aC]||0)+1; if(s.aA) ac[s.aA]=(ac[s.aA]||0)+1; });
  return {cc,ac};
}
function allocate(s,cc,ac){
  const sg=seg(s.grade);
  if(!sg) return {aC:null,aA:null,pU:null,rsn:"Invalid grade"};
  for(const [pc,pa,lbl] of [[s.p1,s.a1,"1st"],[s.p2,s.a2,"2nd"],[s.p3,s.a3,"3rd"]]){
    if(!pc) continue;
    const club=CLUBS[sg].find(c=>c.id===pc);
    if(!club) continue;
    if(club.acts){ if(!pa) continue; const act=club.acts.find(a=>a.id===pa); if(act&&(ac[act.id]||0)<act.cap) return {aC:club.id,aA:act.id,pU:lbl,rsn:lbl+" preference"}; }
    else { if((cc[club.id]||0)<club.cap) return {aC:club.id,aA:null,pU:lbl,rsn:lbl+" preference"}; }
  }
  const avail=CLUBS[sg].flatMap(club=>{
    if(club.acts) return club.acts.filter(a=>(ac[a.id]||0)<a.cap).map(a=>({club,act:a,sp:a.cap-(ac[a.id]||0)}));
    return (cc[club.id]||0)<club.cap?[{club,act:null,sp:club.cap-(cc[club.id]||0)}]:[];
  }).sort((a,b)=>b.sp-a.sp);
  if(avail.length) return {aC:avail[0].club.id,aA:avail[0].act?.id||null,pU:"admin",rsn:"Administrative allocation"};
  return {aC:null,aA:null,pU:null,rsn:"No capacity — manual review"};
}

// ── STATE ─────────────────────────────────────────────────────────────────────
let students  = [];
let segAccess = {A:false,B:false,C:false};
let tab="entry", toasts=[];
let teacher={by:"",grade:"",sec:""};
let form={name:"",p1:"",a1:"",p2:"",a2:"",p3:"",a3:""};
let csvTxt="",csvErr="";
let fSeg="ALL",fSt="ALL",fQ="",fGr="ALL";
let cvGr="ALL",cvSec="ALL",cvEdit=null,cvEditVal="",cvNameEdit=null,cvNameVal="";
let clubViewSeg="ALL",clubViewClub="ALL";

// ── LISTENERS ─────────────────────────────────────────────────────────────────
onSnapshot(query(COL,orderBy("at","asc")),snap=>{
  students=snap.docs.map(d=>({...d.data(),_id:d.id})); render();
},e=>toast("DB error: "+e.message,C.red));

onSnapshot(SCFG,snap=>{
  segAccess=snap.exists()?{A:false,B:false,C:false,...snap.data()}:{A:false,B:false,C:false};
  render();
});

// ── TOAST ─────────────────────────────────────────────────────────────────────
function toast(msg,col=C.grn,sub=""){
  const id=Date.now()+Math.random();
  toasts.push({id,msg,col,sub}); render();
  setTimeout(()=>{ toasts=toasts.filter(t=>t.id!==id); render(); },5000);
}

// ── SEGMENT TOGGLE (admin) ────────────────────────────────────────────────────
async function toggleSeg(s){
  if(!isAdmin) return;
  const nv=!segAccess[s];
  await setDoc(SCFG,{...segAccess,[s]:nv},{merge:true});
  toast(`Segment ${s} (${SINFO[s].grades}) ${nv?"✅ OPENED for entry":"🔒 CLOSED"}`,nv?C.grn:C.amb);
}

// ── DUPLICATE CHECK ───────────────────────────────────────────────────────────
function isDup(name,grade){
  return students.some(s=>s.by===teacher.by&&s.name.trim().toLowerCase()===name.trim().toLowerCase()&&s.grade===grade);
}

// ── ADD STUDENT ───────────────────────────────────────────────────────────────
async function addStudent(){
  if(!teacher.by||!form.name||!teacher.grade||!form.p1) return;
  const sg=seg(teacher.grade);
  if(!isAdmin&&!segAccess[sg]){
    toast(`⛔ Segment ${sg} (${SINFO[sg].grades}) is not open yet.`,C.red,"Please wait for the admin to activate your segment.");
    return;
  }
  const club=gClub(form.p1);
  if(club?.acts&&!form.a1){ toast("Please select an activity for 1st preference",C.amb); return; }
  if(isDup(form.name,teacher.grade)){
    toast(`⚠ You already entered "${form.name}" from Grade ${teacher.grade}!`,C.red,"You cannot enter the same student twice. Ask another teacher if this is a different student with the same name.");
    return;
  }
  const {cc,ac}=counts(students);
  const al=allocate({...form,grade:teacher.grade,section:teacher.sec},cc,ac);
  const s={name:form.name,grade:teacher.grade,section:teacher.sec||"",
    p1:form.p1||"",a1:form.a1||"",p2:form.p2||"",a2:form.a2||"",p3:form.p3||"",a3:form.a3||"",
    by:teacher.by,at:new Date().toISOString(),...al};
  try{
    await addDoc(COL,s);
    const cl=gClub(s.aC),ac2=s.aA?gAct(s.aC,s.aA):null;
    if(cl){
      const lbl=s.pU==="admin"?"Administratively allocated":s.pU==="1st"?"✓ 1st preference honored":s.pU==="2nd"?"↓ 2nd preference used (1st was full)":"↓ 3rd preference used (1st & 2nd were full)";
      toast(`${s.name} → ${cl.name}${ac2?" · "+ac2.name:""}`,rc(s.pU),lbl);
    } else toast(`${s.name} — no seats available, manual review needed`,C.red);
    form={name:"",p1:"",a1:"",p2:"",a2:"",p3:"",a3:""}; render();
  } catch(e){ toast("Save failed: "+e.message,C.red); }
}

// ── ADMIN ACTIONS ─────────────────────────────────────────────────────────────
async function delStudent(fid){ if(!isAdmin) return; try{ await deleteDoc(doc(db,"students",fid)); toast("Entry removed",C.amb); } catch(e){ toast("Delete failed: "+e.message,C.red); } }
async function clearAll(){
  if(!isAdmin||!confirm("Delete ALL student data? Cannot be undone.")) return;
  const snap=await getDocs(COL); const b=writeBatch(db); snap.docs.forEach(d=>b.delete(d.ref)); await b.commit(); toast("All data cleared",C.amb);
}
async function importCSV(){
  csvErr=""; const rows=parseCSV(csvTxt); if(!rows.length){ csvErr="No valid rows found."; render(); return; }
  let running=[...students]; const b=writeBatch(db);
  for(const r of rows){ const {cc,ac}=counts(running); const al=allocate(r,cc,ac); const s={...r,...al}; running.push(s); b.set(doc(COL),s); }
  try{ await b.commit(); csvTxt=""; toast(`✓ ${rows.length} students imported`); } catch(e){ toast("Import failed: "+e.message,C.red); }
  render();
}

async function updateName(fid, newName){
  if(!fid||!newName.trim()) return;
  try{
    await setDoc(doc(db,"students",fid), {name: newName.trim().toUpperCase()}, {merge:true});
    cvNameEdit=null; cvNameVal="";
    toast(`Name updated to "${newName.trim().toUpperCase()}"`, C.grn);
  } catch(e){ toast("Update failed: "+e.message, C.red); }
}

// ── DELETE OWN ENTRY ──────────────────────────────────────────────────────────
async function delOwnEntry(fid){
  if(!fid) return;
  if(!confirm("Remove this entry? The student will be unregistered from their club.")) return;
  try{ await deleteDoc(doc(db,"students",fid)); toast("Entry removed",C.amb); }
  catch(e){ toast("Delete failed: "+e.message,C.red); }
}

// ── XLSX HELPERS ─────────────────────────────────────────────────────────────
function xlsxDL(wb, filename){
  const wbout = XLSX.write(wb, {bookType:'xlsx', type:'array'});
  const blob = new Blob([wbout], {type:'application/octet-stream'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = filename; a.click();
}
function styleHeader(ws, cols){
  // bold header row
  cols.forEach((_,ci)=>{
    const addr = XLSX.utils.encode_cell({r:0,c:ci});
    if(!ws[addr]) return;
    ws[addr].s = {font:{bold:true,color:{rgb:"FFFFFF"}},fill:{fgColor:{rgb:"1C2128"}},alignment:{horizontal:"center"}};
  });
}
function autoWidth(ws, data){
  const cols = Object.keys(data[0]||{});
  ws['!cols'] = cols.map(k=>({ wch: Math.max(k.length, ...data.map(r=>String(r[k]||"").length)) + 2 }));
}

// ── EXCEL EXPORT: FULL CLUB (all grades/sections + optional per-activity sheets) ─
function exportClubViewXLSX(clubId){
  const cl = gClub(clubId); if(!cl) return;
  const mem = sortStudents(students.filter(s=>s.aC===clubId));
  const {ac:acC} = counts(students);
  const wb = XLSX.utils.book_new();

  // ── Sheet 1: Full roster ──────────────────────────────────────────────────
  const rosterData = mem.map((s,i)=>{
    const a = s.aA ? gAct(s.aC,s.aA) : null;
    return {"#":i+1, "Student Name":s.name, "Grade":s.grade, "Section":s.section||"",
            "Sub-Club / Activity":a?a.name:"—", "Allocation Status":s.pU==="admin"?"Admin Alloc":s.pU?s.pU+" preference":s.rsn||"",
            "Entered By":s.by||""};
  });
  const wsRoster = XLSX.utils.json_to_sheet(rosterData);
  autoWidth(wsRoster, rosterData);
  // Title rows above data
  XLSX.utils.sheet_add_aoa(wsRoster,[
    [`GD Goenka Dakshineswar — ${cl.id}: ${cl.name} — Club Allocation 2026-27`],
    [`Downloaded: ${new Date().toLocaleString()} | Members: ${mem.length}/${cl.cap}`],
    []
  ], {origin:"A1"});
  XLSX.utils.sheet_add_json(wsRoster, rosterData, {origin:"A4", skipHeader:false});
  wsRoster['!cols'] = [{wch:4},{wch:28},{wch:10},{wch:10},{wch:24},{wch:22},{wch:20}];
  XLSX.utils.book_append_sheet(wb, wsRoster, "Full Roster");

  // ── Sheet 2: Grade & Section Summary ────────────────────────────────────
  const grades = [...new Set(mem.map(s=>s.grade))].sort((a,b)=>GRADES.indexOf(a)-GRADES.indexOf(b));
  const summaryData = [];
  grades.forEach(gr=>{
    const secs = [...new Set(mem.filter(s=>s.grade===gr).map(s=>s.section||"—"))].sort();
    secs.forEach(sec=>{
      const sm = sortStudents(mem.filter(s=>s.grade===gr&&(s.section||"—")===sec));
      sm.forEach((s,i)=>{
        const a = s.aA ? gAct(s.aC,s.aA) : null;
        summaryData.push({"Grade":s.grade,"Section":s.section||"","#":i+1,"Student Name":s.name,
          "Sub-Club / Activity":a?a.name:"—","Status":s.pU==="admin"?"Admin":s.pU?s.pU+" pref":s.rsn||"","Entered By":s.by||""});
      });
    });
  });
  const wsGS = XLSX.utils.json_to_sheet(summaryData);
  wsGS['!cols'] = [{wch:10},{wch:10},{wch:4},{wch:28},{wch:24},{wch:16},{wch:20}];
  XLSX.utils.book_append_sheet(wb, wsGS, "Grade-Section");

  // ── Sheets per Activity (sub-club) ───────────────────────────────────────
  if(cl.acts){
    cl.acts.forEach(act=>{
      const amem = sortStudents(mem.filter(s=>s.aA===act.id));
      const aData = amem.map((s,i)=>{
        return {"#":i+1,"Student Name":s.name,"Grade":s.grade,"Section":s.section||"",
                "Status":s.pU==="admin"?"Admin":s.pU?s.pU+" pref":s.rsn||"","Entered By":s.by||""};
      });
      const wsA = XLSX.utils.json_to_sheet([]);
      XLSX.utils.sheet_add_aoa(wsA,[
        [`${act.name} — ${cl.id}: ${cl.name}`],
        [`Members: ${amem.length}/${act.cap} | Downloaded: ${new Date().toLocaleString()}`],[]
      ], {origin:"A1"});
      XLSX.utils.sheet_add_json(wsA, aData.length?aData:[{"Note":"No students in this sub-club yet"}], {origin:"A4"});
      wsA['!cols'] = [{wch:4},{wch:28},{wch:10},{wch:10},{wch:16},{wch:20}];
      const sheetName = act.name.replace(/[^a-zA-Z0-9 ]/g,"").substring(0,28);
      XLSX.utils.book_append_sheet(wb, wsA, sheetName);
    });
  }

  xlsxDL(wb, `GDGoenka_${cl.id}_${cl.name.replace(/[^a-zA-Z0-9]/g,"_")}.xlsx`);
  toast(`✓ ${cl.name} — Excel downloaded (${wb.SheetNames.length} sheets)`);
}

// ── EXCEL EXPORT: SINGLE ACTIVITY / SUB-CLUB ──────────────────────────────────
function exportActivityXLSX(clubId, actId){
  const cl = gClub(clubId); if(!cl) return;
  const act = cl.acts?.find(a=>a.id===actId); if(!act) return;
  const amem = sortStudents(students.filter(s=>s.aC===clubId&&s.aA===actId));
  const wb = XLSX.utils.book_new();
  const aData = amem.map((s,i)=>({
    "#":i+1,"Student Name":s.name,"Grade":s.grade,"Section":s.section||"",
    "Status":s.pU==="admin"?"Admin":s.pU?s.pU+" pref":s.rsn||"","Entered By":s.by||""
  }));
  const ws = XLSX.utils.json_to_sheet([]);
  XLSX.utils.sheet_add_aoa(ws,[
    [`GD Goenka Dakshineswar — ${cl.id}: ${cl.name} › ${act.name} — 2026-27`],
    [`Members: ${amem.length}/${act.cap} | Downloaded: ${new Date().toLocaleString()}`],[]
  ], {origin:"A1"});
  XLSX.utils.sheet_add_json(ws, aData.length?aData:[{"Note":"No students allocated to this sub-club yet"}], {origin:"A4"});
  ws['!cols'] = [{wch:4},{wch:28},{wch:10},{wch:10},{wch:16},{wch:20}];

// ── SORT HELPER ───────────────────────────────────────────────────────────────
function sortStudents(arr){
  return [...arr].sort((a,b)=>{
    const gi=GRADES.indexOf(a.grade)-GRADES.indexOf(b.grade);
    if(gi!==0) return gi;
    const sa=(a.section||"").toLowerCase(), sb=(b.section||"").toLowerCase();
    if(sa<sb) return -1; if(sa>sb) return 1;
    return (a.name||"").localeCompare(b.name||"");
  });
}

                  <td style="color:${C.mut};font-size:11px">${s.by||"—"}</td>
                  <td>${canDelete?`<button onclick="${isAdmin?"DS":"DOE"}('${s._id}')" style="background:none;border:none;color:${isDup?C.red:C.mut};font-size:15px;line-height:1;opacity:${isDup?1:0.4}" title="${isDup?"Duplicate — click to remove":"Remove entry"}">🗑</button>`:""}</td>
                </tr>`;
              }).join("")}
            </tbody>
          </table></div>
        </div>`;
      }).join("")}
    </div>`).join("")}
  `;

  // ── CLUB VIEW TAB ──────────────────────────────────────────────────────────
  const clubViewSegs=["ALL","A","B","C"];
  const clubViewClubs=clubViewSeg==="ALL"?ALL:CLUBS[clubViewSeg]||[];
  const clubViewSelected=clubViewClub==="ALL"?null:gClub(clubViewClub);
  // build display: if a specific club is selected show it, else show all clubs in segment
  const renderClubPanel=(cl)=>{
    const mem=sortStudents(students.filter(s=>s.aC===cl.id));
    if(!mem.length) return `<div class="card" style="margin-bottom:12px;padding:14px 18px;opacity:.5">
      <div style="font-weight:700;font-size:13px">${cl.id}: ${cl.name}</div>
      <div style="font-size:11px;color:${C.mut};margin-top:4px">No students allocated yet</div>
    </div>`;
    const {ac:acC}=counts(students);
    const grades=[...new Set(mem.map(s=>s.grade))].sort((a,b)=>GRADES.indexOf(a)-GRADES.indexOf(b));
    const sg2=seg(grades[0]);
    const sCol=sg2?SINFO[sg2].col:C.mut;
    return `<div class="card" style="margin-bottom:14px;padding:0;overflow:hidden">
      <div style="background:${sCol}18;border-bottom:1px solid ${C.bdr};padding:12px 18px;display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px">
        <div>
          <div style="font-weight:700;font-size:14px;color:${sCol}">${cl.id}: ${cl.name}</div>
          <div style="font-size:11px;color:${C.mut};margin-top:2px">${mem.length}/${cl.cap} members${cl.acts?" · "+cl.acts.map(a=>`${a.name}: ${acC[a.id]||0}/${a.cap}`).join(" · "):""}</div>
        </div>
        <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end">
          <button class="btn" onclick="EXCV('${cl.id}')" style="background:${C.grn};font-size:11px;padding:6px 14px">⬇ Full Club Excel (.xlsx)</button>
          ${cl.acts?`<div style="display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end">
            ${cl.acts.map(a=>`<button class="btn" onclick="EXCA('${cl.id}','${a.id}')" style="background:${C.teal};font-size:10px;padding:4px 9px" title="Download ${a.name} sub-club list">⬇ ${a.name}</button>`).join("")}
          </div>`:""}
        </div>
      </div>
      <div style="padding:14px 18px">
        ${grades.map(gr=>{
          const gm=mem.filter(s=>s.grade===gr);
          const secs=[...new Set(gm.map(s=>s.section||"—"))].sort();
          return `<div style="margin-bottom:14px">
            <div style="font-size:11px;font-weight:700;color:${C.mut};letter-spacing:1px;margin-bottom:8px">GRADE ${gr} · ${gm.length} students</div>
            ${secs.map(sec=>{
              const sm=sortStudents(gm.filter(s=>(s.section||"—")===sec));
              return `<div style="margin-bottom:10px">
                <div style="font-size:11px;color:${sCol};font-weight:700;margin-bottom:6px;padding-left:8px;border-left:2px solid ${sCol}">Section ${sec} · ${sm.length} students</div>
                <div class="ov"><table>
                  <thead><tr>${["#","Name","Section","Activity","Status","Entered By",""].map(h=>`<th>${h}</th>`).join("")}</tr></thead>
                  <tbody>${sm.map((s,i)=>{ const a=s.aA?gAct(s.aC,s.aA):null;
                    const isEditingClubName=(cvNameEdit===s._id);
                    const isEditingClubSec=(cvEdit===s._id);
                    const canEdit=isAdmin||(teacher.by&&s.by===teacher.by);
                    const isDupClub=dupIds.has(s._id);
                    return `<tr style="${isDupClub?"background:"+C.red+"15":""}">
                    <td style="color:${C.mut}">${i+1}</td>
                    <td>${isEditingClubName
                      ?`<div style="display:flex;gap:5px;align-items:center"><input value="${cvNameVal}" oninput="cvNameVal=this.value" onkeydown="if(event.key==='Enter')UN('${s._id}',cvNameVal);if(event.key==='Escape'){cvNameEdit=null;render();}" style="width:130px;padding:4px 7px;font-size:12px;text-transform:uppercase"/><button class="btn" onclick="UN('${s._id}',cvNameVal)" style="background:${C.grn};padding:4px 8px;font-size:11px">✓</button><button class="btnO" onclick="cvNameEdit=null;render()" style="padding:4px 6px;font-size:11px">✕</button></div>`
                      :`<span style="display:inline-flex;align-items:center;gap:5px"><span style="font-weight:600">${s.name}</span>${canEdit?`<button onclick="cvNameEdit='${s._id}';cvNameVal='${s.name}';render()" style="background:none;border:1px solid ${C.bdr};border-radius:4px;padding:2px 5px;font-size:11px;color:${C.mut}" title="Edit name">✎</button>`:""}</span>`}
                    </td>
                    <td>${isEditingClubSec
                      ?`<div style="display:flex;gap:5px;align-items:center"><input value="${cvEditVal}" oninput="cvEditVal=this.value" onkeydown="if(event.key==='Enter')US('${s._id}',cvEditVal);if(event.key==='Escape'){cvEdit=null;render();}" maxlength="3" style="width:50px;padding:4px 6px;font-size:12px" placeholder="A"/><button class="btn" onclick="US('${s._id}',cvEditVal)" style="background:${C.grn};padding:4px 8px;font-size:11px">✓</button><button class="btnO" onclick="cvEdit=null;render()" style="padding:4px 6px;font-size:11px">✕</button></div>`
                      :`<span style="display:inline-flex;align-items:center;gap:4px">${`<span class="chip" style="background:${C.acc}22;color:${C.acc};border:1px solid ${C.acc}44">${s.section||"—"}</span>`}${canEdit?`<button onclick="cvEdit='${s._id}';cvEditVal='${s.section||""}';render()" style="background:none;border:1px solid ${C.bdr};border-radius:4px;padding:2px 5px;font-size:11px;color:${C.mut}" title="Edit section">✎</button>`:""}</span>`}
                    </td>
                    <td style="color:${C.mut}">${a?a.name:"—"}</td>
                    <td>${chip(s.pU==="admin"?"Admin":s.pU?s.pU+" pref":s.rsn||"—",rc(s.pU||""))}</td>
                    <td style="color:${C.mut};font-size:11px">${s.by||"—"}</td>
                    <td>${canEdit?`<button onclick="${isAdmin?"DS":"DOE"}('${s._id}')" style="background:none;border:none;color:${isDupClub?C.red:C.mut};font-size:15px;line-height:1;opacity:${isDupClub?1:0.4}" title="${isDupClub?"Duplicate — click to remove":"Remove entry"}">🗑</button>`:""}</td>
                  </tr>`; }).join("")}</tbody>
                </table></div>
              </div>`;
            }).join("")}
          </div>`;
        }).join("")}
      </div>
    </div>`;
  };
  const clubsToShow=clubViewSelected?[clubViewSelected]:(clubViewSeg==="ALL"?ALL:CLUBS[clubViewSeg]);
  const clubViewTab=`
  <div class="card" style="padding:12px 16px;margin-bottom:14px">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:4px">
      <div>
        <div style="font-weight:700;font-size:15px;margin-bottom:2px">🏅 Club View — Grade & Section Breakdown</div>
        <div style="font-size:12px;color:${C.mut}">See each club's members grouped by grade and section · ✎ edit name or section · 🗑 remove your own duplicates · download per-club Excel</div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
        <select style="width:130px" onchange="clubViewSeg=this.value;clubViewClub='ALL';render()">
          ${clubViewSegs.map(s=>`<option value="${s}"${clubViewSeg===s?" selected":""}>${s==="ALL"?"All Segments":"Segment "+s}</option>`).join("")}
        </select>
        <select style="width:200px" onchange="clubViewClub=this.value;render()">
          <option value="ALL">All Clubs</option>
          ${clubViewClubs.map(c=>`<option value="${c.id}"${clubViewClub===c.id?" selected":""}>${c.id}: ${c.name}</option>`).join("")}
        </select>
      </div>
    </div>
    ${dupIds.size>0?`<div style="background:${C.red}15;border:1px solid ${C.red}44;border-radius:6px;padding:9px 14px;margin-top:10px;font-size:12px;color:${C.red}">⚠ <b>${dupIds.size} duplicate entries</b> detected in your submissions — highlighted in red. Use the 🗑 button to remove the extra copy.</div>`:""}
  </div>
  ${clubsToShow.filter(cl=>students.some(s=>s.aC===cl.id)||clubViewSelected).map(cl=>renderClubPanel(cl)).join("")}
  `;

  const tabs={
    entry:entryTab,
    bulk:isAdmin?bulkTab:`<div class="card" style="text-align:center;padding:40px;color:${C.mut}">Admin access required</div>`,
    results:isAdmin?resultsTab:`<div class="card" style="text-align:center;padding:40px;color:${C.mut}">Admin access required</div>`,
    exports:isAdmin?exportsTab:`<div class="card" style="text-align:center;padding:40px;color:${C.mut}">Admin access required</div>`,
    capacity:capacityTab,
    classview:classViewTab,
    clubview:clubViewTab,
    access:isAdmin?accessTab:`<div class="card" style="text-align:center;padding:40px;color:${C.mut}">Admin access required</div>`,
    guide:guideTab
  };
  return `${toastHTML}${hdr}<div style="max-width:1320px;margin:0 auto;padding:22px 18px">${tabs[tab]||""}</div>`;
}

// ── CLASS VIEW XLSX EXPORTS ───────────────────────────────────────────────────
function exportClassViewCSV(grFilter,secFilter){
  const filtered=sortStudents(students.filter(s=>{
    if(grFilter&&grFilter!=="ALL"&&s.grade!==grFilter) return false;
    if(secFilter&&secFilter!=="ALL"&&(s.section||"—")!==secFilter) return false;
    return true;
  }));
  const wb = XLSX.utils.book_new();
  const rowData = filtered.map((s,i)=>{
    const cl=gClub(s.aC), ac2=s.aA?gAct(s.aC,s.aA):null;
    return {"#":i+1,"Student Name":s.name,"Grade":s.grade,"Section":s.section||"",
            "Club Allocated":cl?cl.id+": "+cl.name:"UNALLOCATED",
            "Sub-Club / Activity":ac2?ac2.name:"—",
            "Status":s.pU==="admin"?"Admin Alloc":s.pU?s.pU+" preference":s.rsn||"",
            "Entered By":s.by||""};
  });
  const ws = XLSX.utils.json_to_sheet([]);
  const title = grFilter&&grFilter!=="ALL"
    ?(secFilter&&secFilter!=="ALL"?`Grade ${grFilter} · Section ${secFilter}`:`Grade ${grFilter} · All Sections`)
    :"All Classes";
  XLSX.utils.sheet_add_aoa(ws,[
    [`GD Goenka Dakshineswar — Class View: ${title} — 2026-27`],
    [`Downloaded: ${new Date().toLocaleString()} | ${filtered.length} students`],[]
  ], {origin:"A1"});
  XLSX.utils.sheet_add_json(ws, rowData.length?rowData:[{"Note":"No students match this filter"}], {origin:"A4"});
  ws['!cols'] = [{wch:4},{wch:28},{wch:10},{wch:10},{wch:30},{wch:24},{wch:20},{wch:20}];
  XLSX.utils.book_append_sheet(wb, ws, title.substring(0,28));
  const suffix = grFilter&&grFilter!=="ALL"
    ?(secFilter&&secFilter!=="ALL"?`_Grade${grFilter}_Sec${secFilter}`:`_Grade${grFilter}`)
    :"_AllClasses";
  xlsxDL(wb, `GDGoenka_ClassView${suffix}.xlsx`);
  toast(`✓ Class View — ${title} Excel downloaded`);
}

// ── GLOBALS ───────────────────────────────────────────────────────────────────
window.ST   = v=>{ tab=v; render(); };
window.SF   = (k,v)=>{ form[k]=v; };
window.SFR  = (k,v)=>{ form[k]=v; render(); };
window.SP   = (pk,ak,v)=>{ form={...form,[pk]:v,[ak]:""}; render(); };
window.Tby  = v=>{ teacher.by=v; };
window.TbyR = v=>{ teacher.by=v; render(); };
window.Tsc  = v=>{ teacher.sec=v; };
window.TscR = v=>{ teacher.sec=v; render(); };
window.Tgr  = v=>{ teacher.grade=v; form={name:form.name,p1:"",a1:"",p2:"",a2:"",p3:"",a3:""}; render(); };
window.AS   = addStudent;
window.DS   = delStudent;
window.DOE  = delOwnEntry;
window.CA   = clearAll;
window.IC   = importCSV;
window.TS   = toggleSeg;
window.US   = updateSection;
window.UN   = updateName;
window.EXCV = exportClubViewXLSX;
window.EXCA = exportActivityXLSX;
window.DLCV  = ()=>exportClassViewCSV(cvGr,cvSec);
window.DLCVSEC = (gr,sec)=>exportClassViewCSV(gr,sec);
window.EM   = exportMaster;
window.EC   = exportClubWise;
window.EG   = exportGradeWise;
window.ES   = exportSectionWise;
window.ECG  = exportClubGradeWise;
window.ECGS = exportClubGradeSectionWise;
window.EU   = exportUnalloc;
window.DLT  = ()=>dlCSV("Template_GDGoenka.csv",[
  `"Student Name","Grade","Section","Pref1","Pref1Activity","Pref2","Pref2Activity","Pref3","Pref3Activity","Teacher Name"`,
  `"Aarav Sharma","VI","A","B1","","B3","","B5","B5-Eco","Ms. Das"`,
  `"Priya Roy","VII","B","B7","B7-Western","B6","B6-Yoga","B2","B2-Debate","Mr. Sen"`
]);
window.render = render;
// expose state so inline onchange handlers work
Object.defineProperties(window,{
  cvGr:{get:()=>cvGr,set:v=>{cvGr=v;}},
  cvSec:{get:()=>cvSec,set:v=>{cvSec=v;}},
  cvEdit:{get:()=>cvEdit,set:v=>{cvEdit=v;}},
  cvEditVal:{get:()=>cvEditVal,set:v=>{cvEditVal=v;}},
  cvNameEdit:{get:()=>cvNameEdit,set:v=>{cvNameEdit=v;}},
  cvNameVal:{get:()=>cvNameVal,set:v=>{cvNameVal=v;}},
  clubViewSeg:{get:()=>clubViewSeg,set:v=>{clubViewSeg=v;}},
  clubViewClub:{get:()=>clubViewClub,set:v=>{clubViewClub=v;}},
});
render();
</script>
